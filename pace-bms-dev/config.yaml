name: "BMS Pace - Development"
description: "Pace BMS Interface"
version: "3.dev"
slug: "bms_pace_dev"
url: "https://github.com/andrevza/bmspace/tree/main/pace-bms-dev"
init: false
host_network: false
privileged: []
arch:
  - aarch64
  - amd64
uart: true
usb: true

options:
  mqtt_host: "10.0.0.132"
  mqtt_port: 1883
  mqtt_user: "mqtt-users"
  mqtt_password: "mqtt-users"
  connection_type: "IP"
  bms_ip: "10.0.0.161"
  bms_port: 5000
  bms_serial: "/dev/ttyUSB0"

schema:
  mqtt_host: "str"
  mqtt_port: "port"
  mqtt_client_id: "str?"
  mqtt_user: "str"
  mqtt_password: "password"
  mqtt_ha_discovery: "bool?"
  mqtt_ha_discovery_topic: "str?"
  mqtt_base_topic: "str?"
  connection_type: "list(IP|Serial)"
  bms_ip: "str?"
  bms_port: "port?"
  bms_serial: "str?"
  scan_interval: "int?"
  debug_output: "list(0|1|2|3)?"
  mqtt_discovery_cleanup_startup: "bool?"
  strict_unknown_rtn: "bool?"
  warning_state_max_len: "int?"
  log_periodic_info: "bool?"
  heartbeat_log_interval_min: "int?"
  bms_connect_retries: "int?"
  bms_connect_retry_delay: "int?"
  force_pack_offset: "int?"
  packs_to_read: "int?"
  zero_pad_number_cells: "int?"
  zero_pad_number_packs: "int?"
